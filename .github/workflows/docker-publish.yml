name: Build & Push Docker Image to Harbor

on:
  push:
    branches: ['main']
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: registry.svc.lan
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build Docker image
        run: docker build -t registry.svc.lan/frontend/404page:latest .

      - name: Push image
        run: docker push registry.svc.lan/frontend/404page:latest

      - name: Logout from Harbor
        if: always()
        run: docker logout registry.svc.lan
